spring:
  application:
    name: pally-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER:pally}
    password: ${DB_PASSWORD:pally}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      keepalive-time: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}  # Railway injects PORT; local dev must set it explicitly
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:dev-secret-min-32-chars-long-here-!!}

# Stripe — leave blank in dev so SubscriptionController stays in mock mode.
# Set STRIPE_SECRET_KEY + STRIPE_WEBHOOK_SECRET on Railway to flip to live.
# Register the webhook URL in the Stripe Dashboard as:
#   https://pallybackend-production.up.railway.app/api/v1/subscription/webhook
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  return:
    success-url: ${STRIPE_SUCCESS_URL:pally://subscription/return?status=success}
    cancel-url: ${STRIPE_CANCEL_URL:pally://subscription/return?status=cancel}
  price:
    individual-monthly: ${STRIPE_PRICE_INDIVIDUAL_MONTHLY:}
    family-monthly: ${STRIPE_PRICE_FAMILY_MONTHLY:}

claude:
  api:
    key: ${CLAUDE_API_KEY:}
    base-url: https://api.anthropic.com
    model: claude-haiku-4-5-20251001
    sonnet-model: ${CLAUDE_SONNET_MODEL:claude-sonnet-4-6}
    relevance-max-tokens: 128
    chat-max-tokens: 1024
    version: "2023-06-01"

storage:
  type: ${STORAGE_TYPE:local}
  local:
    base-path: ${STORAGE_LOCAL_PATH:/tmp/pally}
  s3:
    bucket: ${S3_BUCKET:pally-files}
    region: ${S3_REGION:ap-southeast-1}
    endpoint: ${S3_ENDPOINT:}

logging:
  level:
    root: INFO
    com.pally: DEBUG
    com.pally.infrastructure.ai: DEBUG
    com.pally.shared.logging: DEBUG
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.deprecation: WARN
    org.flywaydb: INFO
    io.netty.resolver.dns: ERROR
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

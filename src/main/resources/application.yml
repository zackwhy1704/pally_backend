spring:
  application:
    name: pally-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER:pally}
    password: ${DB_PASSWORD:pally}
    hikari:
      # Env-driven so we can tune per environment without a redeploy. With
      # virtual threads on, the app accepts thousands of concurrent requests
      # but each DB call still borrows a real connection — so the pool is the
      # ceiling and tuning matters MORE, not less. 10s connection-timeout
      # fails fast instead of piling up callers for 30s; leak-detection at
      # 20s catches accidentally-held connections in dev.
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_POOL_TIMEOUT:10000}
      keepalive-time: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: ${DB_LEAK_MS:20000}
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}  # Railway injects PORT; local dev must set it explicitly
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: pally-backend

# Resilience4j around Claude. Retry on 5xx/timeout/429, never on a
# non-429 4xx (those are caller errors). Breaker opens at 50% failure
# over 20 calls and waits 30s in half-open. Pally currently runs single
# instance — counters are per-instance.
resilience4j:
  retry:
    instances:
      claude:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        randomized-wait-factor: 0.5
        retry-exceptions:
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException$TooManyRequests
          - org.springframework.web.reactive.function.client.WebClientResponseException$InternalServerError
          - org.springframework.web.reactive.function.client.WebClientResponseException$BadGateway
          - org.springframework.web.reactive.function.client.WebClientResponseException$ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException$GatewayTimeout
  circuitbreaker:
    instances:
      claude:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

jwt:
  secret: ${JWT_SECRET:dev-secret-min-32-chars-long-here-!!}

# Stripe — leave blank in dev so SubscriptionController stays in mock mode.
# Set STRIPE_SECRET_KEY + STRIPE_WEBHOOK_SECRET on Railway to flip to live.
# Register the webhook URL in the Stripe Dashboard as:
#   https://pallybackend-production.up.railway.app/api/v1/subscription/webhook
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  return:
    success-url: ${STRIPE_SUCCESS_URL:pally://subscription/return?status=success}
    cancel-url: ${STRIPE_CANCEL_URL:pally://subscription/return?status=cancel}
  price:
    individual-monthly: ${STRIPE_PRICE_INDIVIDUAL_MONTHLY:}
    family-monthly: ${STRIPE_PRICE_FAMILY_MONTHLY:}

claude:
  api:
    key: ${CLAUDE_API_KEY:}
    base-url: https://api.anthropic.com
    model: claude-haiku-4-5-20251001
    sonnet-model: ${CLAUDE_SONNET_MODEL:claude-sonnet-4-6}
    relevance-max-tokens: 128
    chat-max-tokens: 1024
    version: "2023-06-01"

storage:
  type: ${STORAGE_TYPE:local}
  local:
    base-path: ${STORAGE_LOCAL_PATH:/tmp/pally}
  s3:
    bucket: ${S3_BUCKET:pally-files}
    region: ${S3_REGION:ap-southeast-1}
    endpoint: ${S3_ENDPOINT:}

logging:
  level:
    root: INFO
    com.pally: DEBUG
    com.pally.infrastructure.ai: DEBUG
    com.pally.shared.logging: DEBUG
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.deprecation: WARN
    org.flywaydb: INFO
    io.netty.resolver.dns: ERROR
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pally-postgres
    environment:
      POSTGRES_DB: pally
      POSTGRES_USER: pally
      POSTGRES_PASSWORD: pally
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pally -d pally"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: MinIO for local S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: pally-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - s3

volumes:
  postgres_data:
  minio_data:
